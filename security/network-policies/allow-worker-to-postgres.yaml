apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-worker-to-postgres

spec:
  podSelector:
    matchLabels:
      app: postgres

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: taskflow-worker
      ports:
        - protocol: TCP
          port: 5432
