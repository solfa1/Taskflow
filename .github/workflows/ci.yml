name: TaskFlow CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-service
          - worker-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Verify Package
        working-directory: ${{ matrix.service }}
        run: npm list --depth=0

      - name: Build Docker Image
        run: |
          docker build \
          -t taskflow-${{ matrix.service }}:latest \
          ./${{ matrix.service }}
