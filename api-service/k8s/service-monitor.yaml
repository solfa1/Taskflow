apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: taskflow-api-monitor
  labels:
    release: prometheus

spec:
  selector:
    matchLabels:
      app: taskflow-api

  endpoints:
    - port: http
      path: /metrics
      interval: 15s

  namespaceSelector:
    matchNames:
      - default
