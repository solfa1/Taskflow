apiVersion: apps/v1
kind: Deployment

metadata:
  name: taskflow-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: taskflow-api

  template:
    metadata:
      labels:
        app: taskflow-api

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3000"

    spec:
      containers:
        - name: taskflow-api
          image: taskflow-api:v3
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          env:
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: Thewayofthesun1
            - name: DB_NAME
              value: taskflow
            - name: DB_PORT
              value: "5432"

            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"

            - name: JWT_SECRET
              value: taskflow-super-secret

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"